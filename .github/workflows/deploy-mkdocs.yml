name: Validate and Deploy MkDocs

on:
  pull_request:
    branches: [main, develop]
  push:
    branches:
      - main
      - develop
      - 'release/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install mkdocs mkdocs-material
      - run: mkdocs build --strict

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install mkdocs mkdocs-material
      - run: mkdocs build --clean

      - name: Compute release destination directory
        if: startsWith(github.ref, 'refs/heads/release/')
        id: release_dir
        shell: bash
        run: |
          dir="${GITHUB_REF_NAME#release/}"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      # PRODUCTION: main -> gh-pages root
      - name: Deploy Production (main)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true

      # UAT: develop -> gh-pages/uat
      - name: Deploy UAT (develop)
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          destination_dir: uat
          keep_files: true

      # STAGING: release/* -> gh-pages/<release-branch-name-without-prefix>
      - name: Deploy Staging (release/*)
        if: startsWith(github.ref, 'refs/heads/release/')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          destination_dir: ${{ steps.release_dir.outputs.dir }}
          keep_files: true
