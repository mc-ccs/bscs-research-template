site_name: Thesis Project
site_description: A modular thesis written in Markdown and published with MkDocs
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - tables
  - footnotes
  - def_list
  - attr_list
nav:
  - Home: index.md
  - Front Matter:
    - Title Page: 01-front-matter/a-title-page.md
    - Abstract: 01-front-matter/b-abstract.md
    - Table of Contents: 01-front-matter/c-table-of-contents.md
    - List of Figures: 01-front-matter/d-list-of-figures.md
    - List of Tables: 01-front-matter/e-list-of-tables.md
  - Chapter 1 Introduction:
    - Project Context: 02-chapter-1-introduction/a-project-context.md
    - Purpose and Description: 02-chapter-1-introduction/b-purpose-and-description.md
    - Objectives and RQ Alignment: 02-chapter-1-introduction/c-objectives-rq-alignment.md
    - Scope and MVP: 02-chapter-1-introduction/d-scope-and-mvp.md
  - Chapter 2 Related Literature:
    - Domain Literature: 03-chapter-2-related-literature/a-domain-literature.md
    - Synthesis Matrix: 03-chapter-2-related-literature/b-synthesis-matrix.md
    - Technical Gap: 03-chapter-2-related-literature/c-technical-gap.md
  - Chapter 3 Methods:
    - Institutional Framework: 04-chapter-3-methods/a-institutional-framework.md
    - Product Backlog: 04-chapter-3-methods/b-product-backlog.md
    - Sprint Structure: 04-chapter-3-methods/c-sprint-structure.md
    - Definition of Done: 04-chapter-3-methods/d-definition-of-done.md
    - System Architecture: 04-chapter-3-methods/e-system-architecture.md
    - Logic Flow: 04-chapter-3-methods/f-logic-flow.md
    - Validation Plan: 04-chapter-3-methods/g-validation-plan.md
  - Chapter 4 Results:
    - Scrum Execution: 05-chapter-4-results/a-scrum-execution.md
    - Features and Outputs: 05-chapter-4-results/b-features-and-outputs.md
    - Report Validation: 05-chapter-4-results/c-report-validation.md
  - Chapter 5 Discussion:
    - Summary of Key Findings: 06-chapter-5-discussion/a-summary-of-key-findings.md
    - RQ3 Validation Analysis: 06-chapter-5-discussion/b-rq3-validation-analysis.md
    - Limitations: 06-chapter-5-discussion/c-limitations.md
    - Recommendations: 06-chapter-5-discussion/d-recommendations.md
  - Appendices:
    - Evaluation Tools or Test Documents: 07-appendices/evaluation-tools.md
    - Sample Input/Output or Reports: 07-appendices/sample-input-output.md
    - User Guide: 07-appendices/user-guide.md
      - CVs:
      - Member 1: 07-appendices/a-cv/member1.md
      - Member 2: 07-appendices/a-cv/member2.md
    - Topic Mine:
      - Member 1: 07-appendices/b-topic-mine/member1.md
      - Member 2: 07-appendices/b-topic-mine/member2.md
    - Title Proposal and Problem Statement Form: 07-appendices/c-title-proposal-and-problem-statement-form.md
    - Title Presentation: 07-appendices/d-title-presention.md
    - Gate 1 Title Defense: 07-appendices/e-gate-1-title-defense.md
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
